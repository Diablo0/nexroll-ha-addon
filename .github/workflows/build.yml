name: Build and publish addon image
on:
  push:
    paths:
      - "nexroll/Dockerfile"
      - "nexroll/run.sh"

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        arch: [amd64, aarch64]
    steps:
      - uses: actions/checkout@v4

      - name: Get version
        id: ver
        run: |
          echo "version=$(grep '^version:' nexroll/config.yaml | awk '{print $2}' | tr -d '\"')" >> "$GITHUB_OUTPUT"

      - name: Set lowercase owner
        id: owner
        run: echo "name=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU (for cross-arch builds)
        uses: docker/setup-qemu-action@v3

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: nexroll
          platforms: ${{ matrix.arch == 'aarch64' && 'linux/arm64' || 'linux/amd64' }}
          push: true
          tags: |
            ghcr.io/diablo0/nexroll-ha-addon/${{ matrix.arch }}:${{ steps.ver.outputs.version }}
            ghcr.io/diablo0/nexroll-ha-addon/${{ matrix.arch }}:latest
